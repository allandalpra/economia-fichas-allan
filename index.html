<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fichas do Allan</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0d0d1a;
      background-image:
        radial-gradient(circle at 20% 50%, #1a1a3e 0%, transparent 50%),
        radial-gradient(circle at 80% 20%, #0d2a4a 0%, transparent 50%);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
      gap: 16px;
    }
    h1 {
      font-family: 'Press Start 2P', monospace;
      color: #ffd700;
      font-size: 14px;
      text-shadow: 2px 2px 0 #8b4500, 4px 4px 0 #5a2d00;
      letter-spacing: 2px;
      text-align: center;
    }
    .hint {
      font-family: 'Press Start 2P', monospace;
      color: #aaa;
      font-size: 7px;
      text-align: center;
      letter-spacing: 1px;
    }
    .game-wrapper {
      position: relative;
      display: inline-block;
      border: 4px solid #333;
      border-radius: 4px;
      box-shadow: 0 0 40px rgba(80,0,180,0.3), 0 0 80px rgba(0,0,0,0.8);
      max-width: min(95vw, 900px);
    }
    .game-image {
      display: block;
      width: 100%;
      height: auto;
      user-select: none;
      pointer-events: none;
    }

    /* === CARDS === */
    .card-overlay {
      position: absolute;
      cursor: pointer;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .card-overlay:not(.revealed):hover .card-hint { opacity: 1; }
    .ctrl-img {
      position: absolute;
      width: 80%;
      height: 80%;
      object-fit: contain;
      image-rendering: pixelated;
      display: none;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      opacity: 0;
    }
    .ctrl-img.visible {
      display: block;
      animation: popIn 0.28s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
    }
    .ctrl-img.restore {
      display: block;
      opacity: 1;
      transform: translate(-50%, -50%) scale(1);
      animation: none;
    }
    @keyframes popIn {
      0%   { opacity: 0; transform: translate(-50%, -50%) scale(0.5); }
      100% { opacity: 1; transform: translate(-50%, -50%) scale(1); }
    }
    .card-hint {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 5px;
      opacity: 0;
      transition: opacity 0.15s;
      background: rgba(0,0,0,0.25);
      pointer-events: none;
    }
    .card-overlay.revealed .card-hint { display: none; }
    .card-hint .arrow {
      font-size: 16px;
      color: #ffd700;
      text-shadow: 0 0 8px #ffd700;
      line-height: 1;
    }
    .card-hint .label {
      font-family: 'Press Start 2P', monospace;
      font-size: 5px;
      color: #ffd700;
      text-shadow: 1px 1px 0 #000;
    }

    /* === CORAÇÕES === */
    .heart-overlay {
      position: absolute;
      cursor: pointer;
      overflow: hidden;
    }

    .heart-gray {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: none;
      image-rendering: pixelated;
    
      /* força a imagem inteira para cinza */
      filter: grayscale(100%) brightness(65%);
    }

    .heart-gray.lost {
      display: block;
      animation: fadeGray 0.2s ease forwards;
    }

    .heart-gray.restore-lost {
      display: block;
      opacity: 1;
      animation: none;
    }
    /*
    @keyframes fadeGray {
    from {
      opacity: 0;
      filter: grayscale(0%) brightness(100%);
    }
    to {
      opacity: 1;
      filter: grayscale(100%) brightness(65%);
    }
  }
  */
  </style>
</head>

  <script>
    const CARDS_KEY  = 'pixelShowcaseCards';
    const HEARTS_KEY = 'pixelShowcaseHearts';

    /* ---- CARDS ---- */
    function loadCards() {
      try { return JSON.parse(localStorage.getItem(CARDS_KEY)) || {1:false,2:false,3:false}; }
      catch(e) { return {1:false,2:false,3:false}; }
    }
    function saveCards(s) {
      try { localStorage.setItem(CARDS_KEY, JSON.stringify(s)); } catch(e) {}
    }
    function applyCard(n, revealed, animate) {
      const card = document.getElementById('card' + n);
      const img  = document.getElementById('img' + n);
      if (revealed) {
        img.classList.remove('visible','restore');
        if (animate) { void img.offsetWidth; img.classList.add('visible'); }
        else { img.classList.add('restore'); }
        card.classList.add('revealed');
      } else {
        img.classList.remove('visible','restore');
        card.classList.remove('revealed');
      }
    }
    const cardState = loadCards();
    [1,2,3].forEach(n => applyCard(n, cardState[n], false));
    [1,2,3].forEach(n => {
      document.getElementById('card'+n).addEventListener('click', () => {
        cardState[n] = !cardState[n];
        applyCard(n, cardState[n], true);
        saveCards(cardState);
      });
    });

    /* ---- CORAÇÕES ---- */
    function loadHearts() {
      try { return JSON.parse(localStorage.getItem(HEARTS_KEY)) || {1:false,2:false,3:false,4:false,5:false}; }
      catch(e) { return {1:false,2:false,3:false,4:false,5:false}; }
    }
    function saveHearts(s) {
      try { localStorage.setItem(HEARTS_KEY, JSON.stringify(s)); } catch(e) {}
    }
    function applyHeart(n, lost, animate) {
      const img = document.getElementById('himg' + n);
      if (lost) {
        img.classList.remove('lost','restore-lost');
        if (animate) { void img.offsetWidth; img.classList.add('lost'); }
        else { img.classList.add('restore-lost'); }
      } else {
        img.classList.remove('lost','restore-lost');
      }
    }
    const heartState = loadHearts();
    [1,2,3,4,5].forEach(n => applyHeart(n, heartState[n], false));
    [1,2,3,4,5].forEach(n => {
      document.getElementById('heart'+n).addEventListener('click', () => {
        heartState[n] = !heartState[n];
        applyHeart(n, heartState[n], true);
        saveHearts(heartState);
      });
    });
  </script>
